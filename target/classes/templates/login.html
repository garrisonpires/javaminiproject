<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Virtual Lab Report System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">

            <div class="login-logo">
                <div class="logo-icon">🧪</div>
                <h1>Virtual Lab Reports</h1>
                <p>Year-wise Lab Conduct Tracking System</p>
            </div>

            <!-- Error Message -->
            <div class="alert alert-error" th:if="${error}">
                ⚠️ <span th:text="${error}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group" style="margin-bottom:16px;">
                    <label class="form-label" for="username">Username</label>
                    <input id="username" class="form-control" type="text" name="username" placeholder="Enter username"
                        required autocomplete="username" />
                </div>
                <div class="form-group" style="margin-bottom:24px;">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" class="form-control" type="password" name="password"
                        placeholder="Enter password" required autocomplete="current-password" />
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
                    🔑 Sign In
                </button>
            </form>


        </div>
    </div>
</body>

</html>
